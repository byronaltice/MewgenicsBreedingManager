name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: build.bat
      shell: cmd

    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        chmod +x build.sh
        ./build.sh
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: MewgenicsManager-${{ runner.os }}
        path: dist/MewgenicsManager-*.zip

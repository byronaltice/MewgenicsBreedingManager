name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows
          - os: ubuntu-latest
            artifact_suffix: linux
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: build.bat
      shell: cmd

    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        chmod +x build.sh
        ./build.sh
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: MewgenicsManager-${{ matrix.artifact_suffix }}
        path: dist/MewgenicsManager-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v5
      with:
        name: MewgenicsManager-windows
        path: release-assets/windows

    - name: Download Linux artifact
      uses: actions/download-artifact@v5
      with:
        name: MewgenicsManager-linux
        path: release-assets/linux

    - name: Publish GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        TAG="${{ github.ref_name }}"
        REPO="${{ github.repository }}"
        if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
          gh release upload "$TAG" release-assets/windows/*.zip release-assets/linux/*.zip --clobber --repo "$REPO"
        else
          gh release create "$TAG" release-assets/windows/*.zip release-assets/linux/*.zip --generate-notes --repo "$REPO"
        fi

    - name: Resolve artifact paths
      id: paths
      run: |
        echo "windows=$(ls release-assets/windows/*.zip)" >> $GITHUB_OUTPUT
        echo "linux=$(ls release-assets/linux/*.zip)" >> $GITHUB_OUTPUT
        echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Upload Windows build to NexusMods
      uses: Nexus-Mods/upload-action@v1
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7135345
        filename: ${{ steps.paths.outputs.windows }}
        version: ${{ steps.paths.outputs.version }}

    - name: Upload Linux build to NexusMods
      uses: Nexus-Mods/upload-action@v1
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: 7221748
        filename: ${{ steps.paths.outputs.linux }}
        version: ${{ steps.paths.outputs.version }}

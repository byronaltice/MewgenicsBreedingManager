name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows
          - os: ubuntu-latest
            artifact_suffix: linux
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: build.bat
      shell: cmd

    - name: Build (Linux)
      if: runner.os == 'Linux'
      run: |
        chmod +x build.sh
        ./build.sh
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: MewgenicsManager-${{ matrix.artifact_suffix }}
        path: dist/MewgenicsManager-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: MewgenicsManager-windows
        path: release-assets/windows

    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: MewgenicsManager-linux
        path: release-assets/linux

    - name: Publish GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ github.ref_name }}" release-assets/windows/*.zip release-assets/linux/*.zip --generate-notes
